<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Documentaire - RENOVEX BAT</title>
    <style>
        :root {
            /* Le bleu corporatif de votre entreprise */
            --primary-blue: #0056b3; 
            --bg-color: #f4f7f6;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            /* Décommentez la ligne ci-dessous et mettez le nom de votre image de fond */
            /* background-image: url('votre-background.jpg'); */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Overlay pour que le texte reste lisible si vous mettez une photo de fond */
        .overlay {
            background-color: rgba(255, 255, 255, 0.85);
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 20px 40px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-bottom: 4px solid var(--primary-blue);
        }

        .logo {
            height: 60px;
            margin-right: 20px;
            /* Remplacer par le nom de votre fichier logo avec les initiales RB et l'emblème de maçonnerie */
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            color: var(--primary-blue);
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            transition: transform 0.2s, border 0.2s;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-blue);
        }

        .icon {
            font-size: 40px;
            margin-right: 15px;
        }

        .folder-icon { color: var(--primary-blue); }
        .file-icon { color: #e74c3c; } /* Rouge pour les PDF par exemple */

        .item-name {
            font-weight: 600;
            font-size: 16px;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="header">
            <img src="logo-rb.png" alt="Logo RENOVEX BAT" class="logo" onerror="this.style.display='none'">
            <h1>Espace Documentaire Partagé</h1>
        </div>

      

            <h2 class="section-title">Documents Partagés</h2>
            <div class="grid">
                <a href="docs/PLAQUE BUREAU.pdf" target="_blank" class="card">
                    <span class="icon file-icon">📄</span>
                    <span class="item-name">Plaque Bureaupdf</span>
                </a>
                <a href="docs/LOGO RB.png" target="_blank" class="card">
                    <span class="icon file-icon">📄</span>
                    <span class="item-name">LOGO RB.png</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
